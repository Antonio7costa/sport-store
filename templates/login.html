<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Admin Login</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form method="POST" class="flex flex-col gap-4">
            <input type="text" name="username" placeholder="Usuário" required class="border p-2 rounded">
            <input type="password" name="password" placeholder="Senha" required class="border p-2 rounded">
            <button type="submit" class="bg-slate-900 text-white p-2 rounded font-semibold hover:bg-slate-800">Entrar</button>
        </form>
        <p class="mt-4 text-center"><a href="/" class="text-sm text-indigo-600 hover:underline">Voltar para o catálogo</a></p>
    </div>
</body>
</html>
