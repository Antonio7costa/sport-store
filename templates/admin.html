<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans">
    <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">Painel Admin</h1>
        <div class="flex gap-4">
            <a href="/" target="_blank" class="text-sm bg-slate-800 px-3 py-1.5 rounded hover:bg-slate-700">Ver Site</a>
            <a href="/logout" class="text-sm bg-red-600 px-3 py-1.5 rounded hover:bg-red-500">Sair</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-lg font-bold mb-4 text-slate-800">Adicionar Nova Camisa</h2>
            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" name="title" placeholder="Nome (Ex: Camisa Real Madrid 24/25)" required class="border p-2 rounded">
                <input type="text" name="category" placeholder="Categoria (Opcional)" class="border p-2 rounded">
                <input type="text" name="price" placeholder="Preço (Ex: R$ 149,90)" required class="border p-2 rounded">
                <div class="md:col-span-2 border p-4 rounded bg-gray-50">
                    <span class="text-sm font-semibold text-slate-700 block mb-3">Quantidade em estoque por tamanho:</span>
                    <div class="grid grid-cols-5 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">P</label>
                            <input type="number" name="stock_p" value="0" min="0" class="w-full border p-2 rounded text-center">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">M</label>
                            <input type="number" name="stock_m" value="0" min="0" class="w-full border p-2 rounded text-center">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">G</label>
                            <input type="number" name="stock_g" value="0" min="0" class="w-full border p-2 rounded text-center">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">GG</label>
                            <input type="number" name="stock_gg" value="0" min="0" class="w-full border p-2 rounded text-center">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">XG</label>
                            <input type="number" name="stock_xg" value="0" min="0" class="w-full border p-2 rounded text-center">
                        </div>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-400 mb-1">Links das Fotos (Cole uma URL por linha):</label>
                    <!-- TextArea limpa para o cadastro (sem o loop shirt.images que causava o erro) -->
                    <textarea name="image_urls" rows="3" spellcheck="false" autocomplete="off" placeholder="Cole uma URL por linha" class="w-full bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-white text-sm"></textarea>
                </div>
                <button type="submit" class="bg-indigo-600 text-white p-2 rounded font-semibold hover:bg-indigo-700 md:col-span-2">Cadastrar Camisa</button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-lg font-bold mb-4 text-slate-800">Camisas Cadastradas</h2>
            <div class="flex flex-col gap-3">
                {% for shirt in shirts %}
                <div class="flex justify-between items-center border-b pb-3">
                    <div class="flex items-center gap-3">
                        <!-- Corrigido para puxar a primeira imagem da nova relação com segurança -->
                        <img src="{{ shirt.images[0].image_url if shirt.images else '' }}" class="w-12 h-12 object-cover rounded bg-gray-100">
                        <div>
                            <p class="font-bold text-slate-800">{{ shirt.title }}</p>
                            <p class="text-xs text-gray-500">{{ shirt.price }}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <a href="/admin/edit/{{ shirt.id }}" class="text-indigo-600 text-sm font-semibold hover:underline">Editar</a>
                        <a href="/admin/delete/{{ shirt.id }}" class="text-red-600 text-sm font-semibold hover:underline">Excluir</a>
                    </div>
                </div>
                {% else %}
                <p class="text-gray-500 text-sm">Nenhum produto cadastrado.</p>
                {% endfor %}
            </div>
        </div>
    </main>
</body>
</html>
